<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Finance Console - Secure & History</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .app-container { width: 100%; max-width: 412px; background: linear-gradient(180deg, #1a233a 0%, #0b0f19 100%); border-radius: 32px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); gap: 16px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .sys-title { font-size: 11px; letter-spacing: 1px; color: #8fa0dd; font-weight: 700; text-transform: uppercase; }
        .status-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
        .status-online { background-color: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-offline { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .main-title { font-size: 32px; font-weight: 800; line-height: 1.1; background: linear-gradient(120deg, #ffffff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 18px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; height: 85px; }
        .card-label { color: #64748b; font-size: 11px; font-weight: 600; }
        .card-val { font-size: 16px; font-weight: 700; }
        .main-cash-card { background: #e6fa41; color: #000000; border-radius: 24px; padding: 20px; }
        .efficiency { font-size: 48px; font-weight: 300; line-height: 1; }
        .cash-row { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 15px; margin-top: 12px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 12px; }
        
        /* Panel Form & Tabel */
        .input-console, .login-console, .history-console { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 18px; }
        .console-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #a5b4fc; text-transform: uppercase; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
        .form-row input, .form-row select { width: 100%; padding: 11px; background: #111827; border: 1px solid #374151; border-radius: 10px; color: #ffffff; font-size: 13px; }
        .btn-submit { background-color: #ffffff; color: #000000; width: 100%; border: none; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .loading-text { display: none; text-align: center; font-size: 12px; color: #e6fa41; margin-top: 10px; font-weight: 600; }

        /* Desain Tabel Riwayat */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 8px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 12px; }
        th { background-color: rgba(255,255,255,0.05); color: #94a3b8; padding: 10px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        .badge-jenis { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .bg-masuk { background-color: rgba(34,197,94,0.2); color: #4ade80; }
        .bg-keluar { background-color: rgba(239,68,68,0.2); color: #f87171; }
        .btn-view { background-color: #e6fa41; color: #000; padding: 2px 8px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 11px; }
        .no-img { color: #64748b; font-style: italic; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="sys-title">Secure & History System</div>
            <div id="status-koneksi" class="status-badge status-offline">● Offline</div>
        </div>

        <div class="main-title">Financial<br>summary</div>

        <div class="stats-grid">
            <div class="stat-card"><div class="card-label">Total Pemasukan</div><div class="card-val" id="txt-masuk" style="color: #34d399;">Rp 0</div></div>
            <div class="stat-card"><div class="card-label">Total Pengeluaran</div><div class="card-val" id="txt-keluar" style="color: #f87171;">Rp 0</div></div>
        </div>

        <div class="main-cash-card">
            <div class="efficiency" id="txt-persen">0%</div>
            <div style="font-size: 12px; color: rgba(0,0,0,0.6);">Margin Efisiensi Kas</div>
            <div class="cash-row"><span>TOTAL KAS AKTIF</span><span id="txt-total-kas">Rp 0</span></div>
        </div>

        <div class="login-console" id="panel-login">
            <div class="console-title">🔑 Login Akses Pengurus</div>
            <div class="form-row">
                <label>Nama Pengurus</label>
                <input type="text" id="log-user" placeholder="Admin / Bendahara">
            </div>
            <div class="form-row">
                <label>Kata Sandi (Password)</label>
                <input type="password" id="log-pass" placeholder="******">
            </div>
            <button class="btn-submit" style="background-color: #e6fa41;" onclick="prosesLogin()">Masuk Sistem</button>
        </div>

        <div class="input-console" id="panel-input" style="display: none;">
            <div class="console-title">📝 Input Data Ter-Breakdown</div>
            <div class="form-row">
                <label>Jenis Aliran Kas</label>
                <select id="inp-jenis" onchange="breakdownKategori()">
                    <option value="Masuk">Masuk (Pemasukan)</option>
                    <option value="Keluar">Keluar (Pengeluaran)</option>
                </select>
            </div>
            <div class="form-row">
                <label>Kategori</label>
                <select id="inp-kategori"></select>
            </div>
            <div class="form-row">
                <label>Keterangan</label>
                <input type="text" id="inp-ket" placeholder="Keterangan transaksi">
            </div>
            <div class="form-row">
                <label>Jumlah (Rp)</label>
                <input type="number" id="inp-jumlah" placeholder="0">
            </div>
            <div class="form-row">
                <label>Upload Bukti Gambar Nota/Kuitansi</label>
                <input type="file" id="inp-file" accept="image/*" style="background: transparent; border: none; padding: 5px 0;">
            </div>
            <button class="btn-submit" onclick="kirimKeSheets()">Simpan ke Google Sheets</button>
            <div class="loading-text" id="loading-txt">Sedang mengunggah gambar & data...</div>
        </div>

        <div class="history-console" id="panel-history" style="display: none;">
            <div class="console-title">📋 Riwayat Kas & Bukti Gambar</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Keterangan</th>
                            <th>Kategori</th>
                            <th>Jenis</th>
                            <th>Jumlah</th>
                            <th>Bukti</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // PENTING: PASTIKAN UNTUK MENGGANTI URL DI BAWAH INI DENGAN URL DEPLOY ANDA
        const SPREADSHEET_API_URL = "SALIN_URL_WEB_APP_ANDA_DI_SINI";

        const kategoriMasuk = ["Pundi", "Bazar", "CFD", "Infaq", "Proposal", "Lainnya"];
        const kategoriKeluar = ["Admin Bank", "Bayar sewa tempat", "Transportasi", "Sewa Alat", "Lainnya"];

        function breakdownKategori() {
            let jenis = document.getElementById('inp-jenis').value;
            let dropdown = document.getElementById('inp-kategori');
            dropdown.innerHTML = "";
            let daftar = (jenis === "Masuk") ? kategoriMasuk : kategoriKeluar;
            daftar.forEach(k => {
                let o = document.createElement('option'); o.value = k; o.innerText = k; dropdown.appendChild(o);
            });
        }

        function formatRupiah(angka) { return "Rp " + Number(angka).toLocaleString('id-ID'); }

        function muatDashboard() {
            fetch(SPREADSHEET_API_URL + "?aksi=baca")
                .then(res => res.json())
                .then(data => {
                    document.getElementById('txt-total-kas').innerText = formatRupiah(data.total_kas);
                    document.getElementById('txt-masuk').innerText = formatRupiah(data.total_masuk);
                    document.getElementById('txt-keluar').innerText = formatRupiah(data.total_keluar);
                    let persen = data.total_masuk > 0 ? Math.round((data.total_kas / data.total_masuk) * 100) : 0;
                    document.getElementById('txt-persen').innerText = persen + "%";
                    document.getElementById('status-koneksi').innerText = "● Online";
                    document.getElementById('status-koneksi').className = "status-badge status-online";

                    // Render Tabel Riwayat Transaksi
                    let tbody = document.getElementById('tabel-body');
                    tbody.innerHTML = "";
                    
                    // Membaca array riwayat yang dikirim oleh web app
                    if(data.riwayat && data.riwayat.length > 0){
                        data.riwayat.forEach(row => {
                            let tr = document.createElement('tr');
                            
                            let badgeClass = row.jenis === "Masuk" ? "badge-jenis bg-masuk" : "badge-jenis bg-keluar";
                            let kolomBukti = (row.bukti && row.bukti.startsWith("http")) 
                                ? `<a href="${row.bukti}" target="_blank" class="btn-view">Lihat Foto</a>` 
                                : `<span class="no-img">Tidak ada</span>`;

                            tr.innerHTML = `
                                <td>${row.keterangan}</td>
                                <td>${row.kategori}</td>
                                <td><span class="${badgeClass}">${row.jenis}</span></td>
                                <td>${formatRupiah(row.jumlah)}</td>
                                <td>${kolomBukti}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    } else {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#64748b;">Belum ada data kas</td></tr>`;
                    }
                });
        }

        function prosesLogin() {
            let user = document.getElementById('log-user').value;
            let pass = document.getElementById('log-pass').value;
            
            fetch(`${SPREADSHEET_API_URL}?aksi=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
                .then(res => res.json())
                .then(hasil => {
                    if(hasil.status === "sukses") {
                        document.getElementById('panel-login').style.display = "none";
                        document.getElementById('panel-input').style.display = "block";
                        document.getElementById('panel-history').style.display = "block";
                        breakdownKategori();
                    } else {
                        alert("Nama Pengurus atau Kata Sandi Salah!");
                    }
                });
        }

        function kirimKeSheets() {
            let ket = document.getElementById('inp-ket').value;
            let jenis = document.getElementById('inp-jenis').value;
            let kat = document.getElementById('inp-kategori').value;
            let jumlah = document.getElementById('inp-jumlah').value;
            let fileInput = document.getElementById('inp-file').files[0];

            if(!ket || !jumlah || jumlah <= 0) { alert("Lengkapi data!"); return; }
            document.getElementById('loading-txt').style.display = "block";

            let objekData = { keterangan: ket, jenis: jenis, kategori: kat, jumlah: jumlah, fileData: null, fileName: null, fileType: null };

            if (fileInput) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let splitData = e.target.result.split(',');
                    objekData.fileData = splitData[1];
                    objekData.fileName = fileInput.name;
                    objekData.fileType = fileInput.type;
                    eksekusiKirimPOST(objekData);
                };
                reader.readAsDataURL(fileInput);
            } else {
                eksekusiKirimPOST(objekData);
            }
        }

        function eksekusiKirimPOST(data) {
            fetch(SPREADSHEET_API_URL, { method: "POST", body: JSON.stringify(data) })
                .then(res => res.json())
                .then(hasil => {
                    document.getElementById('loading-txt').style.display = "none";
                    document.getElementById('inp-ket').value = "";
                    document.getElementById('inp-jumlah').value = "";
                    document.getElementById('inp-file').value = "";
                    muatDashboard();
                    alert("Transaksi dan Bukti Gambar Berhasil Disimpan!");
                });
        }

        window.onload = muatDashboard;
    </script>
</body>
</html>
