<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Summary - Live Kas Sheets</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #E6FA41; /* Hijau lime sesuai gambar */
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 850px;
            background-color: #E6FA41;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 28px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 95px;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            color: rgba(0,0,0,0.6);
            font-size: 12px;
            font-weight: 600;
        }

        .card-value {
            font-size: 18px;
            font-weight: 700;
        }

        .main-cash-card {
            background-color: #FFFFFF;
            border-radius: 24px;
            padding: 24px;
            margin-top: auto;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        .efficiency-percentage {
            font-size: 54px;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .sub-text {
            color: rgba(0,0,0,0.5);
            font-size: 13px;
            margin-top: 4px;
            margin-bottom: 16px;
        }

        .divider {
            height: 1px;
            background-color: rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }

        .cash-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
        }

        .btn-input {
            background-color: #000000;
            color: #FFFFFF;
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal Form */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .modal-content {
            background-color: #FFFFFF;
            padding: 24px;
            border-radius: 24px;
            width: 90%; max-width: 360px;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #DDD; border-radius: 8px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background-color: #EEE; border: none; padding: 12px; width: 50%; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-submit { background-color: #000; color: #FFF; border: none; padding: 12px; width: 50%; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .loading-overlay { display: none; color: #000; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="avatar">P</div>
            <div id="status-koneksi" style="font-size: 12px; font-weight: bold; color: #22c55e;">● Terhubung</div>
        </div>

        <div class="title">March<br>summary</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="card-top"><span>Total Masuk</span></div>
                <div class="card-value" id="txt-masuk">Rp 0</div>
            </div>
            <div class="stat-card">
                <div class="card-top"><span>Total Keluar</span></div>
                <div class="card-value" id="txt-keluar">Rp 0</div>
            </div>
            <div class="stat-card">
                <div class="card-top"><span>Kategori Masuk</span></div>
                <div class="card-value" style="font-size: 12px; color: #16a34a;">Pundi, Bazar, CFD...</div>
            </div>
            <div class="stat-card">
                <div class="card-top"><span>Kategori Keluar</span></div>
                <div class="card-value" style="font-size: 11px; color: #dc2626;">Sewa, Admin, Trans...</div>
            </div>
        </div>

        <div class="main-cash-card">
            <div class="efficiency-percentage" id="txt-persen">0%</div>
            <div class="sub-text">Efisiensi Kas Bersih Aktif</div>
            <div class="divider"></div>
            <div class="cash-row">
                <span>TOTAL KAS</span>
                <span id="txt-total-kas">Rp 0</span>
            </div>
        </div>

        <button class="btn-input" onclick="bukaModal()">Input Transaksi Baru</button>
        <div class="loading-overlay" id="loading-text">Memproses ke Google Sheets...</div>
    </div>

    <div class="modal" id="modalInput">
        <div class="modal-content">
            <div class="modal-title" style="font-weight: bold; margin-bottom: 15px;">Tambah Transaksi</div>
            <div class="form-group">
                <label>Keterangan</label>
                <input type="text" id="inp-ket" placeholder="Contoh: Pembayaran sewa alat">
            </div>
            <div class="form-group">
                <label>Jenis Kas</label>
                <select id="inp-jenis" onchange="sesuaikanKategori()">
                    <option value="Masuk">Masuk (Penerimaan)</option>
                    <option value="Keluar">Keluar (Pengeluaran)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="inp-kategori">
                    </select>
            </div>
            <div class="form-group">
                <label>Jumlah (Rp)</label>
                <input type="number" id="inp-jumlah" placeholder="0">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button class="btn-submit" onclick="kirimKeSheets()">Simpan ke Sheets</button>
            </div>
        </div>
    </div>

    <script>
        // PENTING: GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
        const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbzzZMwOjiwG6HhX9Nr93EVao3vo2lwKVLWKSg6BjHDOnmLTNgvals-_0UDmQTPbO22U/exec";

        const katMasuk = ["Pundi", "Bazar", "CFD", "Infaq", "Proposal", "Lainnya"];
        const katKeluar = ["Admin Bank", "Bayar sewa tempat", "Transportasi", "Sewa Alat", "Lainnya"];

        function sesuaikanKategori() {
            let jenis = document.getElementById('inp-jenis').value;
            let comboKat = document.getElementById('inp-kategori');
            comboKat.innerHTML = "";
            let daftar = (jenis === "Masuk") ? katMasuk : katKeluar;
            daftar.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                comboKat.appendChild(opt);
            });
        }

        function formatRupiah(angka) { return "Rp " + Number(angka).toLocaleString('id-ID'); }

        function muatDataDashboard() {
            document.getElementById('status-koneksi').innerText = "● Memuat...";
            document.getElementById('status-koneksi').style.color = "orange";
            
            fetch(SPREADSHEET_API_URL + "?aksi=baca")
                .then(res => res.json())
                .then(data => {
                    document.getElementById('txt-total-kas').innerText = formatRupiah(data.total_kas);
                    document.getElementById('txt-masuk').innerText = formatRupiah(data.total_masuk);
                    document.getElementById('txt-keluar').innerText = formatRupiah(data.total_keluar);
                    
                    let persen = data.total_masuk > 0 ? Math.round((data.total_kas / data.total_masuk) * 100) : 0;
                    document.getElementById('txt-persen').innerText = persen + "%";
                    
                    document.getElementById('status-koneksi').innerText = "● Terhubung";
                    document.getElementById('status-koneksi').style.color = "#22c55e";
                }).catch(e => {
                    document.getElementById('status-koneksi').innerText = "● Gagal Sinkron";
                    document.getElementById('status-koneksi').style.color = "red";
                });
        }

        function bukaModal() { 
            document.getElementById('modalInput').style.display = 'flex'; 
            sesuaikanKategori();
        }
        function tutupModal() { document.getElementById('modalInput').style.display = 'none'; }

        function kirimKeSheets() {
            let ket = document.getElementById('inp-ket').value;
            let jenis = document.getElementById('inp-jenis').value;
            let kat = document.getElementById('inp-kategori').value;
            let jumlah = document.getElementById('inp-jumlah').value;

            if(!ket || !jumlah) { alert("Mohon lengkapi data!"); return; }

            document.getElementById('loading-text').style.display = "block";
            tutupModal();

            let urlTembak = `${SPREADSHEET_API_URL}?aksi=tambah&keterangan=${encodeURIComponent(ket)}&jenis=${jenis}&kategori=${encodeURIComponent(kat)}&jumlah=${jumlah}`;

            fetch(urlTembak)
                .then(res => res.json())
                .then(hasil => {
                    document.getElementById('loading-text').style.display = "none";
                    // Kosongkan form
                    document.getElementById('inp-ket').value = "";
                    document.getElementById('inp-jumlah').value = "";
                    // Perbarui dashboard aplikasi
                    muatDataDashboard();
                });
        }

        window.onload = muatDataDashboard;
    </script>
</body>
</html>
